name: Deploy stardust to GitHub Pages

# Publishes the static stardust/ design artifacts (brand board + prototypes)
# to GitHub Pages. This is independent of AEM Edge Delivery / Code Sync.

on:
  push:
    branches: [main]
    paths:
      - 'stardust/**'
      - '.github/workflows/stardust-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload stardust/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: stardust

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
